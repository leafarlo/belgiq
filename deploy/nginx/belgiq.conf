# /etc/nginx/sites-available/belgiq
# Symlink: ln -s /etc/nginx/sites-available/belgiq /etc/nginx/sites-enabled/belgiq

server {
    listen 80;
    server_name belgiq.be www.belgiq.be;
    # Certbot will add HTTPS redirect here automatically
}

server {
    listen 443 ssl;
    server_name belgiq.be www.belgiq.be;

    # SSL — managed by Certbot
    ssl_certificate     /etc/letsencrypt/live/belgiq.be/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/belgiq.be/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Gzip compression
    gzip on;
    gzip_types text/plain application/json application/javascript text/css;
    gzip_min_length 1000;

    # ── React frontend (static files) ────────────────────────────────────────
    location / {
        root /var/www/belgiq/frontend/dist;
        try_files $uri $uri/ /index.html;  # SPA routing fallback

        # Cache static assets aggressively
        location ~* \.(js|css|png|jpg|svg|ico|woff2)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
        }
    }

    # ── FastAPI backend ───────────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://127.0.0.1:8000;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # API response caching (5 min for bills, adjust per endpoint)
        proxy_cache_valid  200 5m;
        proxy_cache_bypass $http_cache_control;

        # Timeouts
        proxy_connect_timeout 10s;
        proxy_read_timeout    30s;
    }

    # ── Security headers ─────────────────────────────────────────────────────
    add_header X-Frame-Options        "SAMEORIGIN"  always;
    add_header X-Content-Type-Options "nosniff"     always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;
}
